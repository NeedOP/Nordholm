spring.application.name=Nordholm
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Generate a long random string, e.g.: openssl rand -base64 48
JWT_SECRET=${JWT_SECRET}
JWT_EXPIRATION_MS=3600000

# ?? CORS ??
# Comma-separated origins allowed to call this API.
CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://*.vercel.app}

# ?? Frontend URL (used to build verification / reset links in emails) ??
FRONTEND_URL=${FRONTEND_URL:http://localhost:5173}

# ?? Resend (email) ??
RESEND_API_KEY=${RESEND_API_KEY}
RESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS:onboarding@resend.dev}

# ?? Supabase storage (optional, currently unused by any endpoint) ??
SUPABASE_URL=${SUPABASE_URL:}
SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:}
